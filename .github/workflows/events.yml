name: Events Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1,4'
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/fetch_events.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add events.json
          git commit -m "events update" || echo "no changes"
          git push
