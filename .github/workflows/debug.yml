name: Debug Dump
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/dump_pages.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add debug/
          git commit -m "debug dump" || echo "no changes"
          git push
